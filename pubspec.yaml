name: puzzle_dot
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  #front
  image_picker: ^1.2.1
  path_provider: ^2.1.2
  camera: ^0.11.0
  permission_handler: ^11.3.0
  flutter_tts: ^3.6.0
  shared_preferences: ^2.2.0
  url_launcher: ^6.1.12
